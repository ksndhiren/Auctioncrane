<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | CranesAuctions</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(16, 24, 39, 0.96), rgba(16, 24, 39, 0.88)),
          url("/hero.jpg") center/cover no-repeat;
        font-family: Arial, sans-serif;
        color: #ffffff;
      }

      .card {
        width: min(100%, 720px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 40px;
        background: rgba(11, 18, 32, 0.78);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        margin: 0;
        color: #c9a227;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 0;
        font-size: clamp(38px, 7vw, 64px);
        line-height: 0.96;
        font-weight: 900;
      }

      p {
        margin: 20px 0 0;
        max-width: 48ch;
        font-size: 18px;
        line-height: 1.7;
        color: rgba(226, 232, 240, 0.92);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 30px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .primary {
        background: #c9a227;
        color: #101827;
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.22);
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">404 Error</p>
      <h1>Page Not Found</h1>
      <p>
        The page you are looking for is unavailable or may have been moved.
        Explore the crane marketplace or return to the homepage.
      </p>
      <div class="actions">
        <a class="primary" href="https://www.cranesauctions.com/">Go To Homepage</a>
        <a class="secondary" href="https://www.jeffmartinauctioneers.com/auctions">View Auctions</a>
      </div>
    </main>
  </body>
</html>
